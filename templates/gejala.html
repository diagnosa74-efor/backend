{% extends "layout.html" %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Input Gejala</h5>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Kode Gejala</label>
            <input
              name="kode"
              class="form-control"
              placeholder="Misal: G01"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Nama Gejala</label>
            <input
              name="nama"
              class="form-control"
              placeholder="Masukkan nama gejala"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Bobot</label>
            <input
              name="bobot"
              class="form-control"
              placeholder="0.7"
              required
            />
          </div>

          <button class="btn btn-primary w-100">
            <i class="bi bi-check-lg"></i> Simpan
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- DATA TABLE -->
<div class="card shadow-sm">
  <div class="card-header bg-secondary text-white">
    <h6 class="mb-0">Daftar Gejala</h6>
  </div>
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>Kode</th>
          <th>Nama</th>
          <th>Bobot</th>
        </tr>
      </thead>
      <tbody>
        {% for g in gejala %}
        <tr>
          <td>{{ g.kode }}</td>
          <td>{{ g.nama }}</td>
          <td>{{ g.bobot }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
